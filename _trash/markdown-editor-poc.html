<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor POC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 40px; display: flex; justify-content: center; }

  .card {
    width: 500px;
    min-height: 120px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 16px 20px;
    line-height: 1.6;
    cursor: text;
    white-space: pre-wrap;
    word-wrap: break-word;
    outline: none;
    transition: box-shadow 0.15s;
  }
  .card:focus, .card.editing { box-shadow: 0 0 0 2px #4a9eff44, 0 2px 8px rgba(0,0,0,0.08); border-color: #4a9eff; }
  .card.display { cursor: pointer; }
  .card.display:hover { border-color: #bbb; }

  /* Display mode rendered styles */
  .card.display h1, .card.display h2, .card.display h3 { margin: 0.3em 0 0.1em; }
  .card.display h1 { font-size: 1.5em; }
  .card.display h2 { font-size: 1.3em; }
  .card.display h3 { font-size: 1.15em; }
  .card.display code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
  .card.display ul { padding-left: 1.5em; margin: 0.2em 0; }

  /* Edit mode: syntax markers */
  .syn { color: #bbb; font-size: 0.85em; font-weight: normal; font-style: normal; }

  /* Edit mode: formatted content */
  .card .md-h1 { font-size: 1.5em; font-weight: bold; }
  .card .md-h2 { font-size: 1.3em; font-weight: bold; }
  .card .md-h3 { font-size: 1.15em; font-weight: bold; }
  .card .md-bold { font-weight: bold; }
  .card .md-italic { font-style: italic; }
  .card .md-code { font-family: 'SF Mono', 'Fira Code', monospace; background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
  .card .md-bullet { color: #bbb; }

  .hint { text-align: center; margin-top: 16px; color: #999; font-size: 13px; }
</style>
</head>
<body>

<div>
  <div class="card display" id="card">Click here to edit some markdown...</div>
  <div class="hint">Click card to edit. Click outside to preview.</div>
</div>

<script>
const card = document.getElementById('card');
let markdown = '# Hello World\n\nThis is **bold** and *italic* text.\n\n## Features\n\n- Inline `code` rendering\n- Live **styled** syntax\n- Click to edit\n\n### Simple & clean';

// --- Cursor save/restore via flat character offset ---

function getCursorOffset(el) {
  const sel = window.getSelection();
  if (!sel.rangeCount || !el.contains(sel.anchorNode)) return -1;
  const range = sel.getRangeAt(0).cloneRange();
  range.selectNodeContents(el);
  range.setEnd(sel.anchorNode, sel.anchorOffset);
  return range.toString().length;
}

function setCursorOffset(el, offset) {
  if (offset < 0) return;
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  let pos = 0;
  while (walker.nextNode()) {
    const node = walker.currentNode;
    const len = node.textContent.length;
    if (pos + len >= offset) {
      const sel = window.getSelection();
      const range = document.createRange();
      range.setStart(node, offset - pos);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
      return;
    }
    pos += len;
  }
}

// --- Markdown -> styled HTML (edit mode: syntax visible but dimmed) ---

function styledMarkdown(text) {
  return text.split('\n').map(line => {
    // Headings
    const hMatch = line.match(/^(#{1,3}) (.*)$/);
    if (hMatch) {
      const level = hMatch[1].length;
      const content = inlineStyles(hMatch[2]);
      return `<span class="syn">${hMatch[1]} </span><span class="md-h${level}">${content}</span>`;
    }
    // Bullets
    if (line.match(/^- (.*)$/)) {
      const content = inlineStyles(line.slice(2));
      return `<span class="md-bullet syn">- </span>${content}`;
    }
    // Plain paragraph
    return inlineStyles(line);
  }).join('\n');
}

function inlineStyles(text) {
  // Bold: **text**
  text = text.replace(/\*\*(.+?)\*\*/g, '<span class="syn">**</span><span class="md-bold">$1</span><span class="syn">**</span>');
  // Italic: *text* (but not inside already-processed bold)
  text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<span class="syn">*</span><span class="md-italic">$1</span><span class="syn">*</span>');
  // Inline code: `text`
  text = text.replace(/`(.+?)`/g, '<span class="syn">`</span><span class="md-code">$1</span><span class="syn">`</span>');
  return text;
}

// --- Markdown -> clean HTML (display mode) ---

function renderMarkdown(text) {
  return text.split('\n').map(line => {
    const hMatch = line.match(/^(#{1,3}) (.*)$/);
    if (hMatch) {
      const level = hMatch[1].length;
      return `<h${level}>${renderInline(hMatch[2])}</h${level}>`;
    }
    if (line.match(/^- (.*)$/)) {
      return `<li>${renderInline(line.slice(2))}</li>`;
    }
    if (line === '') return '<br>';
    return `<p>${renderInline(line)}</p>`;
  }).join('');
}

function renderInline(text) {
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  text = text.replace(/`(.+?)`/g, '<code>$1</code>');
  return text;
}

// --- Mode switching ---

function enterEditMode() {
  if (!card.classList.contains('display')) return;
  card.classList.remove('display');
  card.classList.add('editing');
  card.contentEditable = 'true';
  card.innerHTML = styledMarkdown(markdown);
  card.focus();
  // Place cursor at end
  setCursorOffset(card, markdown.length);
}

function exitEditMode() {
  if (card.classList.contains('display')) return;
  // Extract plain text (markdown source) from contenteditable
  markdown = card.textContent;
  card.contentEditable = 'false';
  card.classList.remove('editing');
  card.classList.add('display');
  card.innerHTML = renderMarkdown(markdown);
}

// --- Live re-render on input ---

card.addEventListener('input', () => {
  if (card.classList.contains('display')) return;
  const offset = getCursorOffset(card);
  markdown = card.textContent;
  card.innerHTML = styledMarkdown(markdown);
  setCursorOffset(card, offset);
});

// --- Click to edit ---
card.addEventListener('click', () => enterEditMode());

// --- Click outside to preview ---
document.addEventListener('mousedown', (e) => {
  if (!card.contains(e.target) && !card.classList.contains('display')) {
    exitEditMode();
  }
});

// --- Initial render ---
card.innerHTML = renderMarkdown(markdown);
</script>

</body>
</html>
