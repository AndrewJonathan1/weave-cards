<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@LAMP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false } }</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f0;
            color: #2d2d2d;
            line-height: 1.55;
            opacity: 0;
            transition: opacity 0.12s ease;
        }

        body.loaded { opacity: 1; }

        /* ---- Toolbar ---- */
        #toolbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e0e0db;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #toolbar .title {
            font-weight: 700;
            font-size: 15px;
            color: #2d2d2d;
            letter-spacing: 0.01em;
        }

        #toolbar .hint {
            font-size: 11px;
            color: #bbb;
            margin-left: auto;
            font-style: italic;
        }

        /* ---- Board ---- */
        #board {
            padding: 24px 0 120px;
        }

        /* ---- Row ---- */
        .column {
            padding: 28px 40px 32px;
            border-bottom: 1px solid #e8e8e3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .column:last-child { border-bottom: none; }

        /* ---- Row Title ---- */
        .column-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent, #2d2d2d);
            letter-spacing: -0.01em;
            color: #1a1a1a;
            display: inline-block;
        }

        /* ---- Cards ---- */
        .card-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e5e0;
            border-radius: 14px;
            padding: 28px 24px 24px;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--card-accent, #ccc);
        }

        .card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.07);
            transform: translateY(-1px);
        }

        /* Per-card accent colors */
        .card-row > .card:nth-child(1) { --card-accent: #B89545; }
        .card-row > .card:nth-child(2) { --card-accent: #5B7B9A; }
        .card-row > .card:nth-child(3) { --card-accent: #6B8B6B; }
        .card-row > .card:nth-child(4) { --card-accent: #8B6B8E; }
        .card-row > .card:nth-child(5) { --card-accent: #B86B4A; }

        .card h3 {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--card-accent, #888);
            margin: 0 0 16px;
        }

        .card p {
            font-size: 13px;
            margin: 6px 0;
            color: #444;
        }

        /* Top-level items as labels */
        .card > ul, .card > ol {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .card > ul > li {
            margin: 0 0 14px;
            color: #2d2d2d;
            font-size: 14px;
            font-weight: 500;
        }

        .card > ul > li:last-child { margin-bottom: 0; }

        /* Nested items as chips */
        .card > ul > li > ul {
            list-style: none;
            padding: 0;
            margin: 8px 0 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card > ul > li > ul > li {
            background: #f5f5f0;
            color: #555;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            margin: 0;
        }

        .card strong {
            font-weight: 600;
            color: #2d2d2d;
        }

        /* ---- Outline (Workflowy-style) ---- */
        .outline {
            font-size: 13px;
        }

        .outline ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .outline > ul > li {
            margin-bottom: 8px;
        }

        .outline li {
            position: relative;
            padding-left: 16px;
            margin: 2px 0;
            color: #444;
        }

        .outline li::before {
            content: '';
            position: absolute;
            left: 2px;
            top: 8px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #ccc;
        }

        .outline li > ul {
            padding-left: 4px;
            margin-left: 6px;
            border-left: 1px solid #e8e8e3;
        }

        .outline strong {
            font-weight: 600;
            color: #2d2d2d;
        }

        /* Pinned items get a subtle highlight */
        .outline li:has(> strong) {
            color: #2d2d2d;
        }

        /* ---- Prose ---- */
        .prose {
            font-size: 13px;
            color: #444;
        }

        .prose p { margin: 8px 0; }
        .prose strong { color: #2d2d2d; }

        .prose ul, .prose ol {
            margin: 6px 0;
            padding-left: 18px;
        }

        .prose li { margin: 3px 0; }

        .prose h3 {
            font-size: 14px;
            font-weight: 700;
            margin: 16px 0 8px;
            color: #1a1a1a;
        }

        .prose blockquote {
            border-left: 2px solid #ddd;
            padding-left: 12px;
            color: #777;
            margin: 10px 0;
        }

        /* ---- Empty state ---- */
        .column-empty {
            font-size: 12px;
            color: #ccc;
            font-style: italic;
            padding: 12px 0;
        }

        /* ---- Print ---- */
        @media print {
            #toolbar { display: none; }
            .column { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <span class="title">@LAMP</span>
        <span class="hint">Edit files in sections/ &mdash; saves reload instantly</span>
    </div>
    <div id="board"></div>

    <script type="module">
        import { marked } from 'marked';

        // Import all section markdown files, sorted by filename
        const modules = import.meta.glob('./sections/*.md', {
            query: '?raw',
            import: 'default',
            eager: true
        });

        marked.setOptions({ breaks: false, gfm: true });

        // Parse YAML-like frontmatter
        function parseFrontmatter(raw) {
            const match = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
            if (!match) return { meta: {}, content: raw };
            const meta = {};
            match[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx > 0) {
                    meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
                }
            });
            return { meta, content: match[2] };
        }

        // Render content split into cards by ### headings
        function renderCards(md) {
            const trimmed = md.trim();
            if (!trimmed) return '<div class="column-empty">Empty — add content to this file</div>';

            // Split by ### headings, keeping content before first heading as its own chunk
            const chunks = trimmed.split(/(?=^### )/m).filter(s => s.trim());

            const cards = chunks.map(chunk => {
                const html = marked.parse(chunk.trim());
                return '<div class="card">' + html + '</div>';
            }).join('');
            return '<div class="card-row">' + cards + '</div>';
        }

        // Render as hierarchical outline (Workflowy-style)
        function renderOutline(md) {
            const trimmed = md.trim();
            if (!trimmed) return '<div class="column-empty">Empty — add content to this file</div>';
            return '<div class="outline">' + marked.parse(trimmed) + '</div>';
        }

        // Render as prose
        function renderProse(md) {
            const trimmed = md.trim();
            if (!trimmed) return '<div class="column-empty">Empty — add content to this file</div>';
            return '<div class="prose">' + marked.parse(trimmed) + '</div>';
        }

        // Build the board
        const board = document.getElementById('board');
        const sorted = Object.entries(modules).sort(([a], [b]) => a.localeCompare(b));

        for (const [path, raw] of sorted) {
            const { meta, content } = parseFrontmatter(raw);

            const col = document.createElement('div');
            col.className = 'column';
            if (meta.color) col.style.setProperty('--accent', meta.color);

            // Title
            const title = document.createElement('h2');
            title.className = 'column-title';
            const fallbackTitle = path.split('/').pop()
                .replace(/^\d+-/, '')
                .replace('.md', '')
                .replace(/-/g, ' ');
            title.textContent = meta.title || fallbackTitle;
            col.appendChild(title);

            // Body
            const body = document.createElement('div');
            body.className = 'column-body';

            const style = (meta.style || 'outline').trim();
            switch (style) {
                case 'cards':
                    body.innerHTML = renderCards(content);
                    break;
                case 'prose':
                    body.innerHTML = renderProse(content);
                    break;
                case 'outline':
                default:
                    body.innerHTML = renderOutline(content);
                    break;
            }

            col.appendChild(body);
            board.appendChild(col);
        }

        // Fade in — no flash
        document.body.classList.add('loaded');
    </script>
</body>
</html>
