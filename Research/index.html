<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@LAMP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { preflight: false } }</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f0;
            color: #2d2d2d;
            line-height: 1.55;
            opacity: 0;
            transition: opacity 0.12s ease;
        }

        body.loaded { opacity: 1; }

        /* ---- Toolbar ---- */
        #toolbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e0e0db;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #toolbar .title {
            font-weight: 700;
            font-size: 15px;
            color: #2d2d2d;
            letter-spacing: 0.01em;
        }

        #toolbar .hint {
            font-size: 11px;
            color: #bbb;
            margin-left: auto;
            font-style: italic;
        }

        /* ---- Board ---- */
        #board {
            padding: 24px 0 120px;
        }

        /* ---- Row ---- */
        .column {
            padding: 28px 40px 32px;
            border-bottom: 1px solid #e8e8e3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .column:last-child { border-bottom: none; }

        /* ---- Row Title ---- */
        .column-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent, #2d2d2d);
            letter-spacing: -0.01em;
            color: #1a1a1a;
            display: inline-block;
        }

        /* ---- Cards ---- */
        .card-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e5e0;
            border-radius: 14px;
            padding: 28px 28px 24px;
            transition: box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        /* ---- Card icon ---- */
        .card-icon {
            width: 28px;
            height: 28px;
            color: var(--card-accent, #999);
            flex-shrink: 0;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }

        /* Per-card accent colors */
        .card-row > .card:nth-child(1) { --card-accent: #B89545; }
        .card-row > .card:nth-child(2) { --card-accent: #5B7B9A; }
        .card-row > .card:nth-child(3) { --card-accent: #6B8B6B; }

        /* ---- Card title (h3) — the keyword ---- */
        .card h3 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.01em;
            color: #1a1a1a;
            margin: 0 0 2px;
            line-height: 1.2;
        }

        /* ---- Card subtitle (em right after h3) ---- */
        .card h3 + p { margin: 0 0 20px; }
        .card h3 + p em,
        .card > p em {
            font-size: 14px;
            font-style: italic;
            color: #888;
            font-weight: 400;
        }

        /* ---- Sub-section label (h4) ---- */
        .card h4 {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
            margin: 0 0 10px;
        }

        .card p {
            font-size: 13px;
            margin: 6px 0;
            color: #444;
        }

        /* ---- Numbered list ---- */
        .card ol {
            list-style: none;
            padding: 0;
            margin: 0;
            counter-reset: card-item;
        }

        .card ol li {
            counter-increment: card-item;
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 7px 0;
            border-bottom: 1px solid #f0eeea;
            font-size: 14px;
            color: #3a3a3a;
            margin: 0;
        }

        .card ol li:last-child { border-bottom: none; }

        .card ol li::before {
            content: counter(card-item);
            font-size: 11px;
            font-weight: 700;
            color: var(--card-accent, #bbb);
            min-width: 16px;
            text-align: right;
            flex-shrink: 0;
        }

        /* ---- Unordered list fallback ---- */
        .card ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .card ul li {
            padding: 7px 0;
            border-bottom: 1px solid #f0eeea;
            font-size: 14px;
            color: #3a3a3a;
            margin: 0;
        }

        .card ul li:last-child { border-bottom: none; }

        .card strong {
            font-weight: 600;
            color: #2d2d2d;
        }

        /* ---- Outline (Workflowy-style) ---- */
        .outline {
            font-size: 13px;
        }

        .outline ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .outline > ul > li {
            margin-bottom: 8px;
        }

        .outline li {
            position: relative;
            padding-left: 16px;
            margin: 2px 0;
            color: #444;
        }

        .outline li::before {
            content: '';
            position: absolute;
            left: 2px;
            top: 8px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #ccc;
        }

        .outline li > ul {
            padding-left: 4px;
            margin-left: 6px;
            border-left: 1px solid #e8e8e3;
        }

        .outline strong {
            font-weight: 600;
            color: #2d2d2d;
        }

        /* Pinned items get a subtle highlight */
        .outline li:has(> strong) {
            color: #2d2d2d;
        }

        /* ---- Prose ---- */
        .prose {
            font-size: 13px;
            color: #444;
        }

        .prose p { margin: 8px 0; }
        .prose strong { color: #2d2d2d; }

        .prose ul, .prose ol {
            margin: 6px 0;
            padding-left: 18px;
        }

        .prose li { margin: 3px 0; }

        .prose h3 {
            font-size: 14px;
            font-weight: 700;
            margin: 16px 0 8px;
            color: #1a1a1a;
        }

        .prose blockquote {
            border-left: 2px solid #ddd;
            padding-left: 12px;
            color: #777;
            margin: 10px 0;
        }

        /* ---- Empty state ---- */
        .column-empty {
            font-size: 12px;
            color: #ccc;
            font-style: italic;
            padding: 12px 0;
        }

        /* ---- Print ---- */
        @media print {
            #toolbar { display: none; }
            .column { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <span class="title">@LAMP</span>
        <span class="hint">Edit files in sections/ &mdash; saves reload instantly</span>
    </div>
    <div id="board"></div>

    <script type="module">
        import { marked } from 'marked';

        // Import all section markdown files, sorted by filename
        const modules = import.meta.glob('./sections/*.md', {
            query: '?raw',
            import: 'default',
            eager: true
        });

        marked.setOptions({ breaks: false, gfm: true });

        // Parse YAML-like frontmatter
        function parseFrontmatter(raw) {
            const match = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
            if (!match) return { meta: {}, content: raw };
            const meta = {};
            match[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx > 0) {
                    meta[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
                }
            });
            return { meta, content: match[2] };
        }

        // SVG icons keyed by heading keyword
        const cardIcons = {
            'PRESENTATION': `<svg class="card-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="20" cy="22" rx="12" ry="10"/>
                <ellipse cx="20" cy="22" rx="4" ry="4"/>
                <path d="M14 12c0-4 2.5-6 6-6s6 2 6 6"/>
                <line x1="26" y1="10" x2="30" y2="6"/>
                <circle cx="31" cy="5" r="2" fill="currentColor" stroke="none"/>
                <line x1="8" y1="14" x2="6" y2="10"/>
                <circle cx="5.5" cy="8.5" r="2" fill="currentColor" stroke="none"/>
                <line x1="32" y1="18" x2="36" y2="16"/>
                <circle cx="37" cy="15" r="1.5" fill="currentColor" stroke="none"/>
            </svg>`,
            'PROCESS': `<svg class="card-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="16" width="10" height="10" rx="1.5"/>
                <rect x="26" y="16" width="10" height="10" rx="1.5"/>
                <rect x="15" y="6" width="10" height="10" rx="1.5"/>
                <rect x="15" y="26" width="10" height="10" rx="1.5"/>
                <line x1="14" y1="21" x2="26" y2="21"/>
                <line x1="20" y1="16" x2="20" y2="6" stroke-dasharray="0"/>
                <path d="M17 29l3 3 3-3" fill="none"/>
                <polyline points="23 18 26 21 23 24"/>
            </svg>`,
            'DISTRIBUTION': `<svg class="card-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="24" width="28" height="10" rx="2"/>
                <line x1="12" y1="28" x2="12" y2="30"/>
                <line x1="16" y1="27" x2="16" y2="31"/>
                <line x1="20" y1="26" x2="20" y2="32"/>
                <line x1="24" y1="27" x2="24" y2="31"/>
                <line x1="28" y1="28" x2="28" y2="30"/>
                <path d="M8 24v-6a2 2 0 012-2h20a2 2 0 012 2v6"/>
                <circle cx="20" cy="10" r="4"/>
                <path d="M16 10h8"/>
                <path d="M20 6v8"/>
            </svg>`
        };

        // Render content split into cards by ### headings
        function renderCards(md) {
            const trimmed = md.trim();
            if (!trimmed) return '<div class="column-empty">Empty — add content to this file</div>';

            const chunks = trimmed.split(/(?=^### )/m).filter(s => s.trim());

            const cards = chunks.map(chunk => {
                const html = marked.parse(chunk.trim());
                // Find the keyword to match an icon
                const headingMatch = chunk.match(/^### (\w+)/);
                const keyword = headingMatch ? headingMatch[1] : '';
                const icon = cardIcons[keyword] || '';
                // Replace the h3 with icon + h3 wrapped in a header div
                const withHeader = icon
                    ? html.replace(/<h3>/, '<div class="card-header">' + icon + '<h3>').replace(/<\/h3>/, '</h3></div>')
                    : html;
                return '<div class="card">' + withHeader + '</div>';
            }).join('');
            return '<div class="card-row">' + cards + '</div>';
        }

        // Render as hierarchical outline (Workflowy-style)
        function renderOutline(md) {
            const trimmed = md.trim();
            if (!trimmed) return '<div class="column-empty">Empty — add content to this file</div>';
            return '<div class="outline">' + marked.parse(trimmed) + '</div>';
        }

        // Render as prose
        function renderProse(md) {
            const trimmed = md.trim();
            if (!trimmed) return '<div class="column-empty">Empty — add content to this file</div>';
            return '<div class="prose">' + marked.parse(trimmed) + '</div>';
        }

        // Build the board
        const board = document.getElementById('board');
        const sorted = Object.entries(modules).sort(([a], [b]) => a.localeCompare(b));

        for (const [path, raw] of sorted) {
            const { meta, content } = parseFrontmatter(raw);

            const col = document.createElement('div');
            col.className = 'column';
            if (meta.color) col.style.setProperty('--accent', meta.color);

            // Title
            const title = document.createElement('h2');
            title.className = 'column-title';
            const fallbackTitle = path.split('/').pop()
                .replace(/^\d+-/, '')
                .replace('.md', '')
                .replace(/-/g, ' ');
            title.textContent = meta.title || fallbackTitle;
            col.appendChild(title);

            // Body
            const body = document.createElement('div');
            body.className = 'column-body';

            const style = (meta.style || 'outline').trim();
            switch (style) {
                case 'cards':
                    body.innerHTML = renderCards(content);
                    break;
                case 'prose':
                    body.innerHTML = renderProse(content);
                    break;
                case 'outline':
                default:
                    body.innerHTML = renderOutline(content);
                    break;
            }

            col.appendChild(body);
            board.appendChild(col);
        }

        // Fade in — no flash
        document.body.classList.add('loaded');
    </script>
</body>
</html>
